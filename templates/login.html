<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: #0a0a0a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        .login-box {
            margin-top: 100px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: cyan;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00cccc;
        }
    </style>
</head>

<body>

<h2>Secure Admin Portal</h2>

<div class="login-box">
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <button type="submit">Login</button>
    </form>

    <!-- Messages -->
    {% if error %}
        <p style="color:yellow;">{{ error }}</p>
    {% endif %}

    {% if retry %}
        <p style="color:red;">{{ retry }}</p>
    {% endif %}
</div>

</body>
</html>
